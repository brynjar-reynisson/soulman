# nats-server.conf
#
# NATS messaging bus for Project Soulman.
# Bind on all interfaces so home-network processes can connect.
# Restrict to LAN at the OS firewall level (port 4222, your subnet).
#
# No authentication — the firewall is the perimeter. Any process that can
# reach port 4222 is already on the trusted home network; if a malicious
# process has LAN access, the message bus is the least of the concerns.

listen: "0.0.0.0:4222"

# JetStream — enables persistence for input queues and the raw stimulus log.
jetstream {
  store_dir: "C:/nats/data"
  max_memory_store: 256MB
  max_file_store: 2GB
}

# Logging
log_file: "C:/nats/nats-server.log"
log_size_limit: 64MB
logtime: true
